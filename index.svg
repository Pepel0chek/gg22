    </circle>
    <circle cx="780" cy="380" r="5.2" fill="#C0C0C0" opacity="0.7">
      <animate attributeName="cy" values="380;230;380" dur="4.6s" repeatCount="indefinite" />
    </circle>
    <circle cx="220" cy="430" r="4.2" fill="#808080" opacity="0.8">
      <animate attributeName="cy" values="430;280;430" dur="4.1s" repeatCount="indefinite" />
    </circle>
    <circle cx="720" cy="410" r="4.7" fill="#A9A9A9" opacity="0.7">
      <animate attributeName="cy" values="410;260;410" dur="4.4s" repeatCount="indefinite" />
    </circle>
    <circle cx="280" cy="390" r="5.8" fill="#696969" opacity="0.8">
      <animate attributeName="cy" values="390;240;390" dur="4.7s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Мощное свечение в основании -->
  <g opacity="0.3">
