<svg width="900" height="550" viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Сложные градиенты для максимально реалистичного огня -->
    <radialGradient id="fireCore1" cx="30%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#ffffff">
        <animate attributeName="stop-color" values="#ffffff;#ffffcc;#ffffff" dur="0.15s" repeatCount="indefinite" />
      </stop>
      <stop offset="20%" stop-color="#ffff66">
        <animate attributeName="stop-color" values="#ffff66;#ffee00;#ffff66" dur="0.2s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#ffaa00">
        <animate attributeName="stop-color" values="#ffaa00;#ff8800;#ffaa00" dur="0.25s" repeatCount="indefinite" />
      </stop>
      <stop offset="80%" stop-color="#ff5500">
        <animate attributeName="stop-color" values="#ff5500;#ff3300;#ff5500" dur="0.3s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#cc3300" stop-opacity="0.9">
        <animate attributeName="stop-color" values="#cc3300;#aa2200;#cc3300" dur="0.35s" repeatCount="indefinite" />
      </stop>
    </radialGradient>

    <radialGradient id="fireOuter1" cx="40%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#ffaa00" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#dd4400" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#992200" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#551100" stop-opacity="0.4"/>
    </radialGradient>

    <radialGradient id="fireCore2" cx="35%" cy="20%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="25%" stop-color="#ffff88"/>
      <stop offset="55%" stop-color="#ffaa22"/>
      <stop offset="85%" stop-color="#ff4400"/>
      <stop offset="100%" stop-color="#aa2200"/>
    </radialGradient>

    <radialGradient id="fireCore3" cx="25%" cy="22%" r="72%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#ffffaa"/>
      <stop offset="60%" stop-color="#ffbb33"/>
      <stop offset="90%" stop-color="#ff5500"/>
      <stop offset="100%" stop-color="#bb3300"/>
    </radialGradient>

    <!-- Фильтры для мощного свечения -->
    <filter id="glowHuge" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur1"/>
      <feGaussianBlur stdDeviation="20" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2" opacity="0.6"/>
        <feMergeNode in="blur1" opacity="0.8"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowIntense" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Текстура для реалистичности -->
    <pattern id="fireTexture" patternUnits="userSpaceOnUse" width="20" height="20" patternTransform="rotate(45)">
      <rect width="10" height="20" fill="#ffffff" opacity="0.03"/>
      <rect x="10" width="10" height="20" fill="#ffaa00" opacity="0.03"/>
    </pattern>
  </defs>

  <!-- Фон (темный, ночной) -->
  <rect width="900" height="550" fill="#050200"/>
  
  <!-- Общее свечение от костров (очень мощное) -->
  <circle cx="250" cy="280" r="200" fill="#ff4400" opacity="0.15" filter="url(#glowHuge)"/>
  <circle cx="450" cy="260" r="250" fill="#ff6600" opacity="0.2" filter="url(#glowHuge)"/>
  <circle cx="650" cy="280" r="220" fill="#ff3300" opacity="0.15" filter="url(#glowHuge)"/>

  <!-- Текстура огня -->
  <rect width="900" height="550" fill="url(#fireTexture)" opacity="0.3"/>

  <!-- ОГРОМНЫЕ дрова для костров (утолщенные) -->
  <g filter="url(#glowIntense)">
    <!-- Левый костер - массивные дрова -->
    <ellipse cx="250" cy="380" rx="90" ry="35" fill="#331900"/>
    <rect x="200" y="330" width="30" height="70" fill="#442200" transform="rotate(15 200 330)" rx="5"/>
    <rect x="230" y="315" width="35" height="80" fill="#552200" transform="rotate(-8 230 315)" rx="6"/>
    <rect x="270" y="320" width="30" height="75" fill="#663300" transform="rotate(10 270 320)" rx="5"/>
    <rect x="210" y="350" width="40" height="60" fill="#442200" transform="rotate(-5 210 350)" rx="7"/>
    <rect x="290" y="340" width="28" height="65" fill="#553300" transform="rotate(12 290 340)" rx="5"/>
    <circle cx="250" cy="380" r="25" fill="#331900" opacity="0.5"/>

    <!-- Центральный костер - САМЫЕ ТОЛСТЫЕ дрова -->
    <ellipse cx="450" cy="360" rx="120" ry="45" fill="#331900"/>
    <rect x="380" y="290" width="45" height="100" fill="#442200" transform="rotate(10 380 290)" rx="8"/>
    <rect x="430" y="280" width="50" height="110" fill="#552200" transform="rotate(-12 430 280)" rx="9"/>
    <rect x="480" y="295" width="45" height="95" fill="#663300" transform="rotate(8 480 295)" rx="8"/>
    <rect x="400" y="320" width="55" height="85" fill="#442200" transform="rotate(-5 400 320)" rx="10"/>
    <rect x="460" y="310" width="40" height="90" fill="#553300" transform="rotate(15 460 310)" rx="7"/>
    <rect x="350" y="330" width="35" height="80" fill="#332200" transform="rotate(20 350 330)" rx="6"/>
    <rect x="520" y="315" width="38" height="85" fill="#442200" transform="rotate(-15 520 315)" rx="7"/>
    <circle cx="450" cy="360" r="35" fill="#331900" opacity="0.5"/>

    <!-- Правый костер - массивные дрова -->
    <ellipse cx="650" cy="380" rx="95" ry="38" fill="#331900"/>
    <rect x="600" y="325" width="32" height="75" fill="#442200" transform="rotate(-12 600 325)" rx="6"/>
    <rect x="630" y="310" width="38" height="85" fill="#552200" transform="rotate(14 630 310)" rx="7"/>
    <rect x="670" y="320" width="34" height="78" fill="#663300" transform="rotate(-8 670 320)" rx="6"/>
    <rect x="610" y="345" width="45" height="65" fill="#442200" transform="rotate(6 610 345)" rx="8"/>
    <rect x="690" y="335" width="30" height="70" fill="#553300" transform="rotate(-18 690 335)" rx="5"/>
    <circle cx="650" cy="380" r="28" fill="#331900" opacity="0.5"/>
  </g>

  <!-- ЛЕВЫЙ ОГОНЬ - ОГРОМНЫЙ и ТОЛСТЫЙ -->
  <g transform="translate(250, 240)" filter="url(#glowHuge)">
    <!-- Основная масса пламени -->
    <path d="M0,-140 Q-45,-100 -35,-45 Q-30,-10 -55,30 Q-65,65 -30,85 Q10,105 45,85 Q75,65 60,30 Q45,-5 65,-45 Q85,-90 45,-125 Q20,-150 0,-140" fill="url(#fireCore1)" opacity="0.95">
      <animate attributeName="d" values="M0,-140 Q-45,-100 -35,-45 Q-30,-10 -55,30 Q-65,65 -30,85 Q10,105 45,85 Q75,65 60,30 Q45,-5 65,-45 Q85,-90 45,-125 Q20,-150 0,-140;
        M-15,-135 Q-55,-95 -40,-40 Q-35,-5 -60,35 Q-70,70 -35,90 Q5,112 50,90 Q80,70 65,35 Q50,0 70,-40 Q90,-85 50,-120 Q25,-145 -15,-135;
        M10,-145 Q-40,-105 -30,-50 Q-25,-15 -50,25 Q-60,60 -25,80 Q15,100 50,80 Q80,60 65,25 Q50,-10 70,-50 Q90,-95 50,-130 Q25,-155 10,-145;
        M0,-140 Q-45,-100 -35,-45 Q-30,-10 -55,30 Q-65,65 -30,85 Q10,105 45,85 Q75,65 60,30 Q45,-5 65,-45 Q85,-90 45,-125 Q20,-150 0,-140" dur="0.5s" repeatCount="indefinite" />
    </path>
    
    <!-- Второй слой (яркое ядро) -->
    <path d="M15,-105 Q-20,-75 -10,-30 Q-5,0 -30,30 Q-40,55 -15,70 Q15,85 40,70 Q60,55 50,30 Q40,5 55,-25 Q70,-60 40,-90 Q25,-115 15,-105" fill="#ffff00" opacity="0.9">
      <animate attributeName="d" values="M15,-105 Q-20,-75 -10,-30 Q-5,0 -30,30 Q-40,55 -15,70 Q15,85 40,70 Q60,55 50,30 Q40,5 55,-25 Q70,-60 40,-90 Q25,-115 15,-105;
        M5,-100 Q-30,-70 -15,-25 Q-10,5 -35,35 Q-45,60 -20,75 Q10,90 45,75 Q65,60 55,35 Q45,10 60,-20 Q75,-55 45,-85 Q30,-110 5,-100;
        M20,-110 Q-15,-80 -8,-35 Q-3,-5 -28,25 Q-38,50 -13,65 Q17,80 42,65 Q62,50 52,25 Q42,0 57,-30 Q72,-65 42,-95 Q27,-120 20,-110;
        M15,-105 Q-20,-75 -10,-30 Q-5,0 -30,30 Q-40,55 -15,70 Q15,85 40,70 Q60,55 50,30 Q40,5 55,-25 Q70,-60 40,-90 Q25,-115 15,-105" dur="0.4s" repeatCount="indefinite" />
    </path>
    
    <!-- Третий слой (самое яркое ядро) -->
    <path d="M5,-75 Q-15,-55 -5,-20 Q0,5 -15,25 Q-22,40 -5,48 Q12,55 28,45 Q40,35 32,15 Q24,-2 35,-25 Q45,-45 25,-60 Q12,-70 5,-75" fill="#ffffff" opacity="1">
      <animate attributeName="d" values="M5,-75 Q-15,-55 -5,-20 Q0,5 -15,25 Q-22,40 -5,48 Q12,55 28,45 Q40,35 32,15 Q24,-2 35,-25 Q45,-45 25,-60 Q12,-70 5,-75;
        M0,-70 Q-20,-50 -8,-18 Q-3,7 -18,27 Q-25,42 -8,50 Q8,58 30,47 Q42,37 34,17 Q26,0 37,-23 Q47,-42 27,-58 Q14,-68 0,-70;
        M8,-78 Q-12,-58 -3,-22 Q2,3 -13,23 Q-20,38 -3,46 Q10,52 26,43 Q38,33 30,13 Q22,-4 33,-27 Q43,-47 23,-62 Q10,-73 8,-78;
        M5,-75 Q-15,-55 -5,-20 Q0,5 -15,25 Q-22,40 -5,48 Q12,55 28,45 Q40,35 32,15 Q24,-2 35,-25 Q45,-45 25,-60 Q12,-70 5,-75" dur="0.3s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- ЦЕНТРАЛЬНЫЙ ОГОНЬ - САМЫЙ ОГРОМНЫЙ И ТОЛСТЫЙ -->
  <g transform="translate(450, 210)" filter="url(#glowHuge)">
    <!-- Основная масса пламени -->
    <path d="M0,-180 Q-60,-130 -45,-60 Q-35,-15 -70,40 Q-85,85 -40,115 Q15,140 60,115 Q100,85 80,40 Q60,-5 85,-55 Q110,-110 60,-150 Q30,-185 0,-180" fill="url(#fireCore2)" opacity="1">
      <animate attributeName="d" values="M0,-180 Q-60,-130 -45,-60 Q-35,-15 -70,40 Q-85,85 -40,115 Q15,140 60,115 Q100,85 80,40 Q60,-5 85,-55 Q110,-110 60,-150 Q30,-185 0,-180;
        M-20,-170 Q-75,-125 -50,-55 Q-40,-10 -75,45 Q-90,90 -45,120 Q10,150 65,120 Q105,90 85,45 Q65,0 90,-50 Q115,-105 65,-145 Q35,-180 -20,-170;
        M15,-185 Q-55,-135 -40,-65 Q-30,-20 -65,35 Q-80,80 -35,110 Q20,135 65,110 Q105,80 85,35 Q65,-10 90,-60 Q115,-115 65,-155 Q35,-190 15,-185;
        M0,-180 Q-60,-130 -45,-60 Q-35,-15 -70,40 Q-85,85 -40,115 Q15,140 60,115 Q100,85 80,40 Q60,-5 85,-55 Q110,-110 60,-150 Q30,-185 0,-180" dur="0.6s" repeatCount="indefinite" />
    </path>
    
    <!-- Второй слой -->
    <path d="M20,-135 Q-30,-95 -15,-40 Q-8,0 -45,40 Q-58,75 -20,100 Q25,120 60,100 Q90,75 70,40 Q52,5 72,-40 Q92,-85 50,-120 Q30,-145 20,-135" fill="#ffff66" opacity="0.95">
      <animate attributeName="d" values="M20,-135 Q-30,-95 -15,-40 Q-8,0 -45,40 Q-58,75 -20,100 Q25,120 60,100 Q90,75 70,40 Q52,5 72,-40 Q92,-85 50,-120 Q30,-145 20,-135;
        M10,-130 Q-40,-90 -20,-35 Q-13,5 -50,45 Q-63,80 -25,105 Q18,125 65,105 Q95,80 75,45 Q57,10 77,-35 Q97,-80 55,-115 Q35,-140 10,-130;
        M25,-140 Q-25,-100 -12,-45 Q-5,-5 -42,35 Q-55,70 -18,95 Q28,115 62,95 Q92,70 72,35 Q54,0 74,-45 Q94,-90 52,-125 Q32,-150 25,-140;
        M20,-135 Q-30,-95 -15,-40 Q-8,0 -45,40 Q-58,75 -20,100 Q25,120 60,100 Q90,75 70,40 Q52,5 72,-40 Q92,-85 50,-120 Q30,-145 20,-135" dur="0.5s" repeatCount="indefinite" />
    </path>
    
    <!-- Третий слой (яркое ядро) -->
    <path d="M10,-95 Q-20,-70 -8,-30 Q-2,0 -25,30 Q-35,55 -8,70 Q20,85 42,70 Q60,55 48,30 Q38,5 52,-25 Q65,-60 38,-80 Q22,-100 10,-95" fill="#ffffff" opacity="1">
      <animate attributeName="d" values="M10,-95 Q-20,-70 -8,-30 Q-2,0 -25,30 Q-35,55 -8,70 Q20,85 42,70 Q60,55 48,30 Q38,5 52,-25 Q65,-60 38,-80 Q22,-100 10,-95;
        M5,-90 Q-25,-65 -12,-28 Q-6,2 -28,32 Q-38,58 -11,72 Q16,88 45,72 Q63,58 51,32 Q41,7 55,-22 Q68,-57 41,-77 Q25,-97 5,-90;
        M15,-98 Q-15,-73 -5,-32 Q0,-2 -22,28 Q-32,53 -6,68 Q22,82 40,68 Q58,53 46,28 Q36,3 50,-27 Q63,-62 36,-82 Q20,-103 15,-98;
        M10,-95 Q-20,-70 -8,-30 Q-2,0 -25,30 Q-35,55 -8,70 Q20,85 42,70 Q60,55 48,30 Q38,5 52,-25 Q65,-60 38,-80 Q22,-100 10,-95" dur="0.35s" repeatCount="indefinite" />
    </path>
    
    <!-- Дополнительные языки для объема -->
    <path d="M-30,-70 Q-50,-45 -35,-20 Q-25,0 -45,25 Q-55,45 -30,55 Q-5,65 15,50 Q30,35 20,15 Q10,-5 25,-30 Q40,-55 15,-70 Q-5,-80 -30,-70" fill="#ffaa00" opacity="0.8">
      <animate attributeName="d" values="M-30,-70 Q-50,-45 -35,-20 Q-25,0 -45,25 Q-55,45 -30,55 Q-5,65 15,50 Q30,35 20,15 Q10,-5 25,-30 Q40,-55 15,-70 Q-5,-80 -30,-70;
        M-35,-65 Q-55,-42 -38,-18 Q-28,2 -48,27 Q-58,48 -33,58 Q-8,68 18,52 Q33,37 23,17 Q13,-2 28,-27 Q43,-52 18,-67 Q-2,-78 -35,-65;
        M-25,-72 Q-45,-48 -32,-22 Q-22,2 -42,23 Q-52,42 -28,53 Q-3,62 12,48 Q27,33 17,13 Q7,-8 22,-33 Q37,-58 12,-72 Q-8,-83 -25,-72;
        M-30,-70 Q-50,-45 -35,-20 Q-25,0 -45,25 Q-55,45 -30,55 Q-5,65 15,50 Q30,35 20,15 Q10,-5 25,-30 Q40,-55 15,-70 Q-5,-80 -30,-70" dur="0.45s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- ПРАВЫЙ ОГОНЬ - ОГРОМНЫЙ и ТОЛСТЫЙ -->
  <g transform="translate(650, 240)" filter="url(#glowHuge)">
    <!-- Основная масса пламени -->
    <path d="M0,-150 Q-50,-110 -38,-50 Q-30,-12 -60,32 Q-72,72 -35,95 Q12,115 52,95 Q85,72 68,32 Q52,-5 72,-48 Q92,-98 50,-130 Q25,-158 0,-150" fill="url(#fireCore3)" opacity="0.96">
      <animate attributeName="d" values="M0,-150 Q-50,-110 -38,-50 Q-30,-12 -60,32 Q-72,72 -35,95 Q12,115 52,95 Q85,72 68,32 Q52,-5 72,-48 Q92,-98 50,-130 Q25,-158 0,-150;
        M-12,-145 Q-58,-105 -42,-48 Q-34,-10 -64,35 Q-76,75 -39,98 Q8,120 57,98 Q90,75 72,35 Q56,0 76,-45 Q96,-95 54,-125 Q29,-153 -12,-145;
        M8,-155 Q-45,-115 -35,-52 Q-27,-15 -58,30 Q-70,70 -32,92 Q15,110 50,92 Q82,70 65,30 Q50,-8 70,-52 Q90,-102 48,-135 Q23,-162 8,-155;
        M0,-150 Q-50,-110 -38,-50 Q-30,-12 -60,32 Q-72,72 -35,95 Q12,115 52,95 Q85,72 68,32 Q52,-5 72,-48 Q92,-98 50,-130 Q25,-158 0,-150" dur="0.55s" repeatCount="indefinite" />
    </path>
    
    <!-- Второй слой -->
    <path d="M18,-115 Q-22,-85 -10,-35 Q-3,0 -35,35 Q-48,65 -18,85 Q18,102 48,85 Q72,65 58,35 Q45,5 62,-33 Q78,-75 42,-105 Q25,-125 18,-115" fill="#ffff88" opacity="0.92">
      <animate attributeName="d" values="M18,-115 Q-22,-85 -10,-35 Q-3,0 -35,35 Q-48,65 -18,85 Q18,102 48,85 Q72,65 58,35 Q45,5 62,-33 Q78,-75 42,-105 Q25,-125 18,-115;
        M10,-110 Q-30,-80 -15,-32 Q-8,3 -40,38 Q-53,68 -22,88 Q13,108 52,88 Q76,68 62,38 Q49,8 66,-30 Q82,-72 46,-100 Q29,-120 10,-110;
        M22,-120 Q-18,-90 -8,-38 Q-1,-2 -33,33 Q-46,62 -16,82 Q20,98 46,82 Q70,62 56,33 Q43,3 60,-35 Q76,-78 40,-108 Q23,-130 22,-120;
        M18,-115 Q-22,-85 -10,-35 Q-3,0 -35,35 Q-48,65 -18,85 Q18,102 48,85 Q72,65 58,35 Q45,5 62,-33 Q78,-75 42,-105 Q25,-125 18,-115" dur="0.48s" repeatCount="indefinite" />
    </path>
    
    <!-- Третий слой (ядро) -->
    <path d="M8,-80 Q-18,-58 -6,-25 Q0,0 -20,28 Q-30,48 -6,60 Q15,72 35,60 Q50,48 40,28 Q30,5 42,-22 Q55,-52 32,-70 Q18,-88 8,-80" fill="#ffffff" opacity="1">
      <animate attributeName="d" values="M8,-80 Q-18,-58 -6,-25 Q0,0 -20,28 Q-30,48 -6,60 Q15,72 35,60 Q50,48 40,28 Q30,5 42,-22 Q55,-52 32,-70 Q18,-88 8,-80;
        M3,-75 Q-23,-53 -10,-22 Q-4,3 -24,30 Q-34,50 -10,62 Q10,76 38,62 Q53,50 43,30 Q33,7 45,-20 Q58,-48 35,-67 Q21,-85 3,-75;
        M12,-84 Q-14,-62 -4,-28 Q2,-2 -18,26 Q-28,46 -4,58 Q18,70 33,58 Q48,46 38,26 Q28,3 40,-24 Q53,-55 30,-73 Q16,-92 12,-84;
        M8,-80 Q-18,-58 -6,-25 Q0,0 -20,28 Q-30,48 -6,60 Q15,72 35,60 Q50,48 40,28 Q30,5 42,-22 Q55,-52 32,-70 Q18,-88 8,-80" dur="0.32s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Искры (огромные, как от большого костра) -->
  <g filter="url(#glowIntense)">
    <circle cx="250" cy="150" r="4" fill="#ffcc00">
      <animate attributeName="cy" values="150;70;150" dur="1.2s" repeatCount="indefinite" />
      <animate attributeName="r" values="4;7;4" dur="0.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="450" cy="110" r="6" fill="#ffff00">
      <animate attributeName="cy" values="110;40;110" dur="1.5s" repeatCount="indefinite" />
      <animate attributeName="r" values="6;10;6" dur="0.6s" repeatCount="indefinite" />
    </circle>
    <circle cx="650" cy="140" r="5" fill="#ffaa00">
      <animate attributeName="cy" values="140;60;140" dur="1.3s" repeatCount="indefinite" />
      <animate attributeName="r" values="5;8;5" dur="0.55s" repeatCount="indefinite" />
    </circle>
    <circle cx="380" cy="180" r="3.5" fill="#ff8800">
      <animate attributeName="cy" values="180;100;180" dur="1.1s" repeatCount="indefinite" />
    </circle>
    <circle cx="520" cy="170" r="4.5" fill="#ff9900">
