    <circle cx="700" cy="160" r="4" fill="#ff7700">
      <animate attributeName="cy" values="160;80;160" dur="1.2s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Серый пепел (крупные хлопья) -->
  <g>
    <circle cx="180" cy="400" r="4.5" fill="#808080" opacity="0.7">
      <animate attributeName="cy" values="400;250;400" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.7;0;0.7" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="320" cy="420" r="5" fill="#A9A9A9" opacity="0.8">
      <animate attributeName="cy" values="420;270;420" dur="4.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="400" cy="380" r="6" fill="#696969" opacity="0.7">
      <animate attributeName="cy" values="380;220;380" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="500" cy="410" r="4" fill="#D3D3D3" opacity="0.8">
      <animate attributeName="cy" values="410;260;410" dur="4.2s" repeatCount="indefinite" />
    </circle>
    <circle cx="580" cy="390" r="5.5" fill="#778899" opacity="0.7">
      <animate attributeName="cy" values="390;240;390" dur="4.8s" repeatCount="indefinite" />
    </circle>
    <circle cx="680" cy="400" r="4.8" fill="#BEBEBE" opacity="0.8">
